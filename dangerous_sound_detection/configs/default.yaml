sample_rate: 16000
class_names:
  - normal
  - safety_noise
  - discipline_violation
  - danger_noise
model_class_names:
  - normal
  - safety_noise
  - discipline_violation
  - danger_noise
label_groups:
  normal:
    - normal
  safety_noise:
    - safety_noise
  discipline_violation:
    - discipline_violation
  danger_noise:
    - danger_noise
background_labels:
  - normal
event_labels:
  - safety_noise
  - discipline_violation
  - danger_noise
alert_labels:
  - danger_noise
train_split: 0.7
val_split: 0.15
test_split: 0.15
smoothing_window: 5
confidence_threshold: 0.8
merge_gap_seconds: 0.5
event_gate_min_rms_dbfs: -35.0
event_gate_min_peak_dbfs: -18.0
event_gate_min_rms_above_noise_floor_db: 10.0
event_gate_min_crest_factor: 2.5
event_gate_noise_floor_percentile: 20.0
event_gate_history_size: 32
device: auto
model_save_path: models/classifier.pt
label_encoder_path: models/label_encoder.pkl
features_path: data/processed/features.npy
labels_path: data/processed/labels.npy
window_length: 0.96
hop_length: 0.48
n_fft: 512
stft_hop_length: 160
win_length: 400
hidden_dim: 512
dropout: 0.1
use_class_weights: true
batch_size: 64
num_epochs: 40
learning_rate: 0.0005
data_raw_dir: data/raw_v2
data_processed_dir: data/processed_v2
data_splits_dir: data/splits_v2
